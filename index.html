<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQTkEhpueGD-ZYqcpqbfRRseIqgWLhP7mdUoWdrUvT2adu5XPeVgg7nB3K9CnrdIIhxtccsSu689UZR/pub?gid=1507279278&single=true&output=csv")

.then(res => res.text())

.then(data => {

const filas = data.split("\n");

filas.forEach((fila,i) => {

if(i === 0) return; // salta encabezado

const columnas = fila.split(",");

const nombre = columnas[0];
const trabajadorID = columnas[1];
const promedio = columnas[2];
const formulario = columnas[3];

if(trabajadorID === id){

document.getElementById("nombre").innerText = nombre;
document.getElementById("rating").innerText = "⭐ "+promedio+" / 5";
document.getElementById("boton").href = formulario;

}

});

});

</script>
