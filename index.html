<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">

<title>Calificación trabajador</title>

<style>

body{
font-family:Arial;
background:#2f6f8f;
color:white;
text-align:center;
margin:0;
padding:20px;
}

.card{
background:white;
color:black;
padding:30px;
border-radius:15px;
width:auto;
max-width:350px;
margin:auto;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.rating{
font-size:36px;
font-weight:bold;
margin:10px 0;
}

button{
background:#2f6f8f;
color:white;
border:none;
padding:15px;
border-radius:10px;
font-size:18px;
cursor:pointer;
width:100%;
}

img{
width:120px;
height:120px;
border-radius:50%;
margin-bottom:10px;
}

#foto{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
margin-bottom:15px;
}


</style>

</head>

<body>

<h1 id="nombre">Cargando...</h1>

<img id="foto" src="" alt="Foto trabajador">

<div class="card">

<div id="rating" class="rating">
Cargando...
</div>

<br>

<a id="boton" href="#">
<button>Calificar trabajador</button>
</a>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQTkEhpueGD-ZYqcpqbfRRseIqgWLhP7mdUoWdrUvT2adu5XPeVgg7nB3K9CnrdIIhxtccsSu689UZR/pub?gid=1507279278&single=true&output=csv")

.then(res => res.text())

.then(data => {

const filas = data.trim().split("\n");

for(let i=1;i<filas.length;i++){

let columnas = filas[i].split(",");

let nombre = columnas[0].replaceAll('"',"").trim();
let trabajadorID = columnas[1].replaceAll('"',"").trim();
let promedio = columnas[2].replaceAll('"',"").trim();
let formulario = columnas[3].replaceAll('"',"").trim();

if(trabajadorID === id){

document.getElementById("nombre").innerText = nombre;
document.getElementById("rating").innerText = "⭐ "+promedio+" / 5";
document.getElementById("boton").href = formulario;
document.getElementById("foto").src = columnas[4];


}

}

});

</script>
