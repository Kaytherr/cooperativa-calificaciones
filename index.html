<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Calificación trabajador</title>

<style>

body{
font-family:Arial;
background:#2f6f8f;
color:white;
text-align:center;
padding:50px;
}

.card{
background:white;
color:black;
padding:40px;
border-radius:15px;
width:320px;
margin:auto;
}

.rating{
font-size:40px;
font-weight:bold;
}

button{
background:#2f6f8f;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<h1 id="nombre">Cargando...</h1>

<div class="card">

<div id="rating" class="rating">
Cargando...
</div>

<br>

<a id="boton" href="#">
<button>Calificar trabajador</button>
</a>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQTkEhpueGD-ZYqcpqbfRRseIqgWLhP7mdUoWdrUvT2adu5XPeVgg7nB3K9CnrdIIhxtccsSu689UZR/pub?gid=1507279278&single=true&output=csv")

.then(res => res.text())

.then(data => {

const filas = data.split("\n");

filas.forEach(fila => {

const columnas = fila.split(",");

if(columnas[1]=== id){

document.getElementById("nombre").innerText = columnas[0]
document.getElementById("rating").innerText = "⭐ "+columnas[2]+" / 5";
document.getElementById("boton").href = columnas[3];

}

});

});

</script>

</body>

</html>
