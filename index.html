<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Calificación trabajador</title>

<style>
body{
font-family:Arial;
background:#2f6f8f;
color:white;
text-align:center;
padding:50px;
}

.card{
background:white;
color:black;
padding:40px;
border-radius:15px;
width:320px;
margin:auto;
}

.rating{
font-size:40px;
}
</style>

</head>

<body>

<h1 id="nombre"></h1>

<div class="card">

<div class="rating" id="rating">
Cargando...
</div>

<br>

<a id="boton" href="#">
<button>Calificar trabajador</button>
</a>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

fetch("LINK_DE_TU_CSV")
.then(res => res.text())
.then(data => {

const rows = data.split("\n");

rows.forEach(row => {

const cols = row.split(",");

if(cols[0] === id){

document.getElementById("nombre").innerText = cols[1];
document.getElementById("rating").innerText = "⭐ "+cols[2]+" / 5";
document.getElementById("boton").href = cols[3];

}

});

});

</script>

</body>
</html>
