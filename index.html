<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Calificación trabajador</title>

<style>

body{
font-family:Arial;
background:#2f6f8f;
color:white;
text-align:center;
padding:50px;
}

.card{
background:white;
color:black;
padding:40px;
border-radius:15px;
width:320px;
margin:auto;
}

.rating{
font-size:40px;
font-weight:bold;
}

button{
background:#2f6f8f;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<h1 id="nombre">Buscando trabajador...</h1>

<div class="card">

<div id="rating" class="rating">
Cargando calificación...
</div>

<br>

<a id="boton" href="#">
<button>Calificar trabajador</button>
</a>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(!id){
document.getElementById("nombre").textContent = "No se especificó trabajador";
throw new Error("Falta ID");
}

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQTkEhpueGD-ZYqcpqbfRRseIqgWLhP7mdUoWdrUvT2adu5XPeVgg7nB3K9CnrdIIhxtccsSu689UZR/pub?gid=1507279278&single=true&output=csv")

.then(response => response.text())

.then(data => {

const filas = data.trim().split("\n");

let encontrado = false;

for(let i=1;i<filas.length;i++){

const columnas = filas[i].split(",");

const nombre = columnas[0];
const trabajadorID = columnas[1];
const promedio = columnas[2];
const formulario = columnas[3];

if(trabajadorID === id){

document.getElementById("nombre").textContent = nombre;
document.getElementById("rating").textContent = "⭐ "+promedio+" / 5";
document.getElementById("boton").href = formulario;

encontrado = true;

}

}

if(!encontrado){
document.getElementById("nombre").textContent = "Trabajador no encontrado";
document.getElementById("rating").textContent = "";
}

})

.catch(error=>{
document.getElementById("nombre").textContent = "Error cargando datos";
console.error(error);
});

</script>

</body>
</html>
